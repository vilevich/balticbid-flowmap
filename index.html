<!doctype html>
<html lang="lv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>BalticBid — Plūsmu karte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--canvas:#F4F3F1;--ink:#1A1A1A;--muted:#8A8A86;--line:#E1DED7;--wire:#D7D4CD;--accent:#FF601A;--screen:#FBFAF8;}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Geist',system-ui,sans-serif;color:var(--ink);background:var(--canvas)}
  #viewport{position:fixed;inset:0;cursor:grab;background-image:radial-gradient(circle,#D9D6CF 1px,transparent 1.4px);background-size:26px 26px;}
  #viewport.panning{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .cluster{position:absolute;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.30)}
  .cluster .clabel{position:absolute;top:-11px;left:22px;background:var(--canvas);padding:0 10px;font-family:'Geist',sans-serif;font-weight:500;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .cluster .cdot{width:7px;height:7px;border-radius:2px;display:inline-block;margin-right:7px}
  .node{position:absolute;z-index:2;cursor:pointer}
  .node .badge{position:absolute;top:-10px;left:-10px;width:22px;height:22px;border-radius:50%;background:var(--accent);color:#1A1A1A;font-weight:500;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:3}
  .node .frame{background:#fff;border:1px solid var(--line);border-radius:10px;overflow:hidden;transition:border-color .15s}
  .node:hover .frame{border-color:#9A9A96}
  .node.sel .frame{border-color:var(--accent)}
  .node .caption{margin-top:9px;text-align:center;font-size:11px;font-weight:500;letter-spacing:-.01em;color:var(--ink)}
  .node .sub{display:block;font-weight:400;font-size:10.5px;color:var(--muted);margin-top:2px}
  .phone{padding:6px;background:#EFEDE8;border-radius:20px;border:1px solid var(--line)}
  .phone .frame{border:none}
  .pscr{background:#fff}
  .notch{position:absolute;top:8px;left:50%;transform:translateX(-50%);width:74px;height:9px;border-radius:5px;background:#D8D5CD;z-index:5}
  .desk .stand{height:14px;background:#EFEDE8;margin:0 auto;width:38%;border-radius:0 0 5px 5px}
  .desk .base{height:6px;background:#E1DED7;width:54%;margin:4px auto 0;border-radius:3px}

  /* ===== reusable wireframe component system (real sizes) ===== */
  .s{font-family:'Geist',sans-serif;color:var(--ink);background:var(--screen);line-height:1.45;display:flex;flex-direction:column;overflow:hidden}
  .s *{box-sizing:border-box}
  .chrome{height:34px;background:#F1EFEA;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px;padding:0 14px;flex:none}
  .chrome .d{width:10px;height:10px;border-radius:50%}
  .chrome .u{flex:1;height:20px;background:#fff;border:1px solid var(--line);border-radius:6px;margin-left:8px;display:flex;align-items:center;padding:0 10px;font-size:12px;color:var(--muted)}
  .tb{height:50px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 18px;background:#fff;flex:none}
  .tb-l,.tb-r{display:flex;align-items:center;gap:18px}
  .bmk{width:16px;height:16px;background:var(--accent);border-radius:3px}
  .brand{font-weight:600;font-size:17px;letter-spacing:-.02em}
  .nav{font-size:14px;color:var(--muted)}
  .nav.on{color:var(--ink)}
  .srch{font-size:13px;color:var(--muted);border:1px solid var(--line);border-radius:20px;padding:9px 16px;background:#fff;min-width:190px}
  .globe2{width:18px;height:18px;border:1.5px solid var(--muted);border-radius:50%}
  .ham{width:18px;height:13px;background:linear-gradient(var(--ink) 1.5px,transparent 1.5px,transparent 5.5px,var(--ink) 5.5px,var(--ink) 7px,transparent 7px,transparent 11px,var(--ink) 11px)}
  .btn{font-size:13px;border-radius:5px;padding:8px 15px;white-space:nowrap;font-weight:500;display:inline-flex;align-items:center;justify-content:center}
  .btn.ghost{border:1px solid var(--line)}
  .btn.dark{background:var(--ink);color:#fff}
  .btn.acc{background:var(--accent);color:var(--ink)}
  .btn.out{border:1px solid var(--line);background:#fff}
  .btn.sm{font-size:12px;padding:6px 11px}
  .body{flex:1;display:flex;min-height:0}
  .main{flex:1;padding:18px;min-width:0;overflow:hidden}
  .pad{padding:18px}
  .h1{font-size:22px;font-weight:600;letter-spacing:-.02em}
  .h2{font-size:17px;font-weight:600;letter-spacing:-.01em}
  .lab{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);font-weight:500}
  .muted{color:var(--muted);font-size:13px}
  .price{font-weight:600;letter-spacing:-.02em}
  .row{display:flex;gap:12px}
  .col{display:flex;flex-direction:column}
  .between{display:flex;align-items:center;justify-content:space-between}
  .photo{background:linear-gradient(#D7E0E6,#EDE9E2);position:relative;overflow:hidden;border-radius:5px}
  .photo .sun{position:absolute;top:14%;right:15%;width:16%;aspect-ratio:1;border-radius:50%;background:#EEC79A}
  .photo .mach{position:absolute;left:30%;bottom:30%;width:40%;height:22%;background:#76726a;border-radius:3px}
  .photo .mach::before{content:"";position:absolute;left:6%;bottom:-30%;width:30%;padding-bottom:30%;background:#4f4c46;border-radius:50%}
  .photo .mach::after{content:"";position:absolute;right:4%;bottom:-44%;width:42%;padding-bottom:42%;background:#4f4c46;border-radius:50%}
  .photo .grd{position:absolute;left:0;right:0;bottom:0;height:26%;background:linear-gradient(#C4BEAF,#B0AA98)}
  .grid{display:grid;gap:14px}
  .g3{grid-template-columns:repeat(3,1fr)}
  .g2{grid-template-columns:repeat(2,1fr)}
  .pc .photo{height:78px}
  .pc .lab{margin-top:7px}
  .pc .ti{font-weight:600;font-size:13px;margin-top:2px}
  .pc .pr{font-weight:600;font-size:15px;margin-top:1px}
  .fld{height:38px;border:1px solid var(--line);border-radius:5px;background:#fff;display:flex;align-items:center;padding:0 11px;font-size:13px;color:var(--muted)}
  .fld.has{color:var(--ink);font-weight:500}
  .fwrap{margin-bottom:10px}
  .flab{font-size:11px;color:var(--muted);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
  .bdg{font-size:11px;padding:3px 9px;border-radius:6px;font-weight:500;white-space:nowrap;display:inline-block}
  .bdg.n{background:#EAE7E0;color:#555}
  .bdg.g{background:#D6EFD6;color:#236B23}
  .bdg.o{background:#FFE0D0;color:#B5430F}
  .bdg.r{background:#F6D8D2;color:#A23B22}
  .sb{width:34%;border-right:1px solid var(--line);background:#fff;padding:12px;flex:none}
  .sbi{font-size:12.5px;padding:8px 11px;color:var(--muted);border-radius:6px;margin-bottom:2px}
  .sbi.on{background:var(--ink);color:#fff;font-weight:500}
  .sbhead{display:flex;align-items:center;gap:8px;padding:0 4px 11px;margin-bottom:6px;border-bottom:1px solid var(--line)}
  .ava{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center}
  .tabs{display:flex;gap:6px;margin-bottom:14px}
  .tab{font-size:12.5px;padding:7px 14px;border:1px solid var(--line);border-radius:6px;color:var(--muted)}
  .tab.on{background:var(--ink);color:#fff;border-color:var(--ink);font-weight:500}
  .tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .tbl td{border-bottom:1px solid #ECEAE4;padding:9px 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tbl td.b{font-weight:600}
  .tbl .hd td{font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);border-bottom:1px solid var(--line)}
  .panel{border:1px solid var(--line);border-radius:7px;padding:14px;background:#fff}
  .lrow{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:7px;padding:9px;margin-bottom:9px;background:#fff}
  .lthumb{width:64px;height:44px;flex:none;border-radius:4px}
  .cnt{flex:1;height:44px;border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:20px;background:#fff}
  .div{height:1px;background:var(--line);margin:13px 0}
  .toggle{width:34px;height:20px;border-radius:11px;background:var(--accent);position:relative;flex:none}
  .toggle.off{background:var(--wire)}
  .toggle::after{content:"";position:absolute;width:14px;height:14px;border-radius:50%;background:#fff;top:3px;right:3px}
  .toggle.off::after{right:auto;left:3px}
  .stat{border:1px solid var(--line);border-radius:7px;padding:13px;background:#fff}
  .stat .v{font-size:22px;font-weight:600;letter-spacing:-.02em}
  .ico{width:30px;height:30px;border-radius:6px;background:#FFE0D0;flex:none}
  .check{width:16px;height:16px;border:1.5px solid var(--muted);border-radius:3px;flex:none}
  .center{display:flex;flex-direction:column;align-items:center;text-align:center}
  .step{display:flex;align-items:center;gap:7px}
  .stepn{width:20px;height:20px;border-radius:50%;font-size:11px;display:flex;align-items:center;justify-content:center;background:var(--wire);color:var(--muted)}
  .stepn.on{background:var(--accent);color:var(--ink)}
  .stepn.done{background:var(--ink);color:#fff}

  /* toolbar */
  #bar{position:fixed;top:16px;left:16px;right:16px;display:flex;align-items:center;gap:14px;z-index:100;pointer-events:none}
  #bar .panel{pointer-events:auto;background:rgba(255,255,255,.9);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:10px;padding:0}
  #title{padding:10px 16px;display:flex;align-items:center;gap:12px}
  #title .mark{width:18px;height:18px;background:var(--accent);border-radius:3px}
  #title b{font-weight:600;font-size:15px;letter-spacing:-.01em}
  #title span{font-size:12px;color:var(--muted)}
  #legend{margin-left:auto;display:flex;gap:16px;padding:9px 16px;font-size:11.5px;align-items:center}
  #legend .lg{display:flex;align-items:center;gap:7px}
  #legend .sw{width:10px;height:10px;border-radius:3px}
  #ctrls{display:flex;gap:6px;padding:7px}
  #ctrls button{pointer-events:auto;width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:16px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
  #ctrls button:hover{border-color:var(--ink)}
  #ctrls button.wide{width:auto;padding:0 12px;font-size:12px;letter-spacing:.04em}
  /* drawer */
  #drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:88vw;background:#fff;border-left:1px solid var(--line);transform:translateX(100%);transition:transform .26s cubic-bezier(.16,1,.3,1);z-index:200;display:flex;flex-direction:column}
  #drawer.open{transform:translateX(0)}
  #drawer .dh{padding:22px 22px 16px;border-bottom:1px solid var(--line)}
  #drawer .dnum{font-size:12px;letter-spacing:.06em;color:var(--accent);font-weight:500}
  #drawer h2{margin:6px 0 4px;font-size:21px;letter-spacing:-.02em}
  #drawer .dsub{font-size:13px;color:var(--muted)}
  #drawer .rolechip{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:6px;background:#F4F3F1;color:var(--ink);font-weight:500}
  #drawer .rolechip i{width:7px;height:7px;border-radius:2px;font-style:normal}
  #drawer .db{padding:20px 22px;overflow:auto;flex:1}
  #drawer .sec{margin-bottom:20px}
  #drawer .sec h3{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 9px;font-weight:600}
  #drawer .sec p{margin:0;font-size:13.5px;line-height:1.55;color:#333}
  #drawer ul{margin:0;padding:0;list-style:none}
  #drawer li{font-size:13px;line-height:1.5;color:#333;padding-left:16px;position:relative;margin-bottom:6px}
  #drawer li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  #drawer .tags{display:flex;flex-wrap:wrap;gap:6px}
  #drawer .tag{font-size:11.5px;padding:4px 9px;border-radius:6px;background:#F4F3F1;border:1px solid var(--line);color:#444}
  #drawer .dclose{position:absolute;top:18px;right:18px;width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:15px;color:var(--muted)}
  #drawer .dclose:hover{border-color:var(--ink);color:var(--ink)}
  #hint{position:fixed;bottom:16px;left:16px;z-index:100;font-size:11.5px;color:var(--muted);background:rgba(255,255,255,.8);border:1px solid var(--line);border-radius:8px;padding:8px 12px;backdrop-filter:blur(8px)}
  #foot{position:fixed;bottom:16px;right:16px;z-index:100;font-size:11px;color:var(--muted);letter-spacing:.04em}
</style>
</head>
<body>
<div id="bar">
  <div class="panel" id="title"><div class="mark"></div><b>BalticBid</b><span>Plūsmu karte · v5.0</span></div>
  <div class="panel" id="legend"><div class="lg"><span class="sw" style="background:#FF601A"></span>Galvenā plūsma</div><div class="lg"><span class="sw" style="background:#C9C6BF"></span>Saistīta</div><div class="lg"><span class="sw" style="background:#fff;border:1px dashed #B9B6AE"></span>Sekundāra</div></div>
  <div class="panel" id="ctrls"><button id="zin">+</button><button id="zout">−</button><button id="reset" class="wide">FIT</button></div>
</div>
<div id="viewport"><div id="world"><svg id="edges"><defs>
  <marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="2.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L5,2.5 L0,5 Z" fill="#C9C6BF"></path></marker>
  <marker id="arrA" markerWidth="6" markerHeight="6" refX="5" refY="2.5" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L5,2.5 L0,5 Z" fill="#FF601A"></path></marker>
</defs></svg></div></div>
<aside id="drawer"><button class="dclose" id="dclose">✕</button>
  <div class="dh"><div class="dnum" id="dnum"></div><h2 id="dtitle"></h2><div class="dsub" id="dsub"></div><div class="rolechip" id="drole"></div></div>
  <div class="db" id="dbody"></div>
</aside>
<div id="hint">Velc fonu, lai pārvietotos · ritini, lai tuvinātu · klikšķini ekrānu, lai redzētu piezīmes</div>
<div id="foot">BALTICBID · WIREFRAME FLOW</div>

<script>
const ROLES={public:{label:'Publisks',color:'#3A3A3A'},user:{label:'Lietotājs',color:'#FF601A'},admin:{label:'Admin',color:'#7A7A76'},system:{label:'Sistēma',color:'#B0ADA6'}};
const PRODS=[['CLAAS · 2020','Arion 650','71 000 €'],['NEW HOLLAND · 2017','T7.270','58 200 €'],['DEUTZ-FAHR · 2015','6155','19 500 €'],['JOHN DEERE · 2019','6155M','52 900 €'],['FENDT · 2016','724 Vario','54 000 €'],['KRONE · 2019','BiG Pack 1290','67 000 €']];

/* ===== reusable components ===== */
const C={
  chrome:(u='balticbid.lv')=>`<div class="chrome"><span class="d" style="background:#E08585"></span><span class="d" style="background:#E5C07A"></span><span class="d" style="background:#9CCB9C"></span><span class="u">${u}</span></div>`,
  topbar:(act)=>`<div class="tb"><div class="tb-l"><span class="bmk"></span><span class="brand">BalticBid</span><span class="nav ${act==='cat'?'on':''}">Katalogs</span><span class="nav">Kā tas strādā</span></div><div class="tb-r"><span class="srch">Meklēt tehniku…</span><span class="globe2"></span><span class="btn ghost">Ienākt</span><span class="btn dark">Reģistrēties</span></div></div>`,
  topbarP:()=>`<div class="tb" style="padding:0 16px"><span class="bmk"></span><span class="brand" style="margin-left:8px">BalticBid</span><span style="flex:1"></span><span class="globe2"></span><span class="ham" style="margin-left:14px"></span></div>`,
  photo:(h,w)=>`<div class="photo" style="height:${h}px${w?';width:'+w+'px':''}"><span class="sun"></span><span class="mach"></span><span class="grd"></span></div>`,
  pcard:(p)=>`<div class="pc col">${C.photo(78)}<div class="lab">${p[0]}</div><div class="ti">${p[1]}</div><div class="pr">${p[2]}</div></div>`,
  grid:(n,cols=3)=>`<div class="grid g${cols}">${PRODS.slice(0,n).map(C.pcard).join('')}</div>`,
  field:(label,val,ph)=>`<div class="fwrap"><div class="flab">${label}</div><div class="fld ${val?'has':''}">${val||ph||''}</div></div>`,
  sidebar:(items,act,head)=>`<div class="sb">${head||''}${items.map((t,i)=>`<div class="sbi ${i===act?'on':''}">${t}</div>`).join('')}</div>`,
  profHead:()=>`<div class="sbhead"><span class="ava">JB</span><span style="font-weight:600;font-size:12.5px">Jānis B.</span></div>`,
  adminHead:()=>`<div class="sbhead"><span class="bmk"></span><span style="font-weight:600;font-size:12.5px">BalticBid</span><span class="bdg o" style="margin-left:auto">Admin</span></div>`,
  tabs:(items,act)=>`<div class="tabs">${items.map((t,i)=>`<span class="tab ${i===act?'on':''}">${t}</span>`).join('')}</div>`,
  table:(head,rows)=>`<table class="tbl"><tr class="hd">${head.map(h=>`<td>${h}</td>`).join('')}</tr>${rows.map(r=>`<tr>${r.map((c,i)=>`<td${i===0?' class="b"':''}>${c}</td>`).join('')}</tr>`).join('')}</table>`,
  btn:(t,v='dark',extra='')=>`<span class="btn ${v}" style="${extra}">${t}</span>`,
};
const PROFNAV=['Pamatdati','Mani solījumi','Favorīti','Dokumenti','Iestatījumi','Drošība'];
const ADMNAV=['Pārskats','Loti','Lietotāji','Dokumenti','Kategorijas'];

/* ===== screens (composed from components, real sizes) ===== */
const SCREENS={
  catalog:()=>C.chrome()+C.topbar('cat')+`<div class="body"><div class="sb"><div class="h2" style="font-size:15px;margin-bottom:10px">Filtri</div><div class="fwrap"><div class="flab">Kārtot</div><div class="fld has">Tuvākais beigām ⌄</div></div><div class="fwrap"><div class="flab">Marka</div><div class="fld"></div></div><div class="fwrap"><div class="flab">Cena, €</div><div class="row"><div class="fld" style="flex:1">No</div><div class="fld" style="flex:1">Līdz</div></div></div></div><div class="main"><div class="between" style="margin-bottom:12px"><span class="muted">8 rezultāti</span><span class="btn out sm">Tuvākais beigām ⌄</span></div>${C.grid(6)}</div></div>`,
  search:()=>C.chrome()+C.topbar()+`<div class="main"><div class="row" style="align-items:center;margin-bottom:12px"><div class="fld has" style="flex:1">Meklēt „John Deere”…</div>${C.btn('Meklēt','dark')}</div><div class="muted" style="margin-bottom:12px">12 rezultāti</div>${C.grid(6)}</div>`,

const world=document.getElementById('world'),svg=document.getElementById('edges'),viewport=document.getElementById('viewport');
const nodeEls={};
function deviceHTML(node){const f=dims(node.dev),nat=NATIVE[node.dev];
  const inner=(SCREENS[node.kind]||(()=>''))();
  const screen='<div class="s" style="width:'+nat.w+'px;height:'+nat.h+'px;transform:scale('+f.k+');transform-origin:top left">'+inner+'</div>';
  if(node.dev==='phone')return '<div class="phone"><div class="pscr" style="position:relative;width:'+f.w+'px;height:'+f.h+'px;overflow:hidden;border-radius:14px"><div class="notch"></div>'+screen+'</div></div>';
  if(node.dev==='desk')return '<div><div class="frame" style="width:'+f.w+'px;height:'+f.h+'px;overflow:hidden;border-radius:8px">'+screen+'</div><div class="stand"></div><div class="base"></div></div>';
  return '<div class="frame" style="width:'+f.w+'px;height:'+f.h+'px;overflow:hidden">'+screen+'</div>';}
CLUSTERS.forEach(cl=>{const d=document.createElement('div');d.className='cluster';
  d.style.cssText='left:'+cl.x+'px;top:'+cl.y+'px;width:'+cl.w+'px;height:'+cl.h+'px;z-index:0';
  d.innerHTML='<div class="clabel"><span class="cdot" style="background:'+cl.color+'"></span>'+cl.label+'</div>';world.appendChild(d);});
NODES.forEach(node=>{const el=document.createElement('div');el.className='node';el.dataset.id=node.id;
  const sz=SIZE[node.dev];el.style.cssText='left:'+node.x+'px;top:'+node.y+'px;width:'+sz.w+'px';
  el.innerHTML='<div class="badge">'+node.n+'</div>'+deviceHTML(node)+'<div class="caption">'+node.title+(node.sub?'<span class="sub">'+node.sub+'</span>':'')+'</div>';
  world.appendChild(el);nodeEls[node.id]={el,node,w:sz.w,h:sz.h};});

function anchor(o,side){const n=o.node,w=o.w,h=o.h,cx=n.x+w/2,cy=n.y+h/2;
  if(side==='r')return[n.x+w,cy,1,0];if(side==='l')return[n.x,cy,-1,0];if(side==='t')return[cx,n.y,0,-1];return[cx,n.y+h,0,1];}
function drawEdges(){let p=svg.querySelector('defs').outerHTML;
  EDGES.forEach(e=>{const A=nodeEls[e.f],B=nodeEls[e.t];if(!A||!B)return;
    const[ax,ay,adx,ady]=anchor(A,e.a),[bx,by,bdx,bdy]=anchor(B,e.b);
    const dist=Math.hypot(bx-ax,by-ay),k=Math.min(130,dist*0.45);
    const c1x=ax+adx*k,c1y=ay+ady*k,c2x=bx+bdx*k,c2y=by+bdy*k;
    const color=e.type==='main'?'#FF601A':'#C9C6BF',dash=e.type==='sec'?'stroke-dasharray="4 4"':'';
    const op=e.type==='sec'?0.6:(e.type==='rel'?0.8:1),mk=e.type==='main'?'url(#arrA)':'url(#arr)';
    p+='<path d="M'+ax+','+ay+' C'+c1x+','+c1y+' '+c2x+','+c2y+' '+bx+','+by+'" fill="none" stroke="'+color+'" stroke-width="1" opacity="'+op+'" '+dash+' marker-end="'+mk+'"></path>';});
  svg.innerHTML=p;}

let tx=0,ty=0,scale=1;
function apply(){world.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';}
let down=false,moved=false,sx=0,sy=0,otx=0,oty=0;
viewport.addEventListener('mousedown',e=>{down=true;moved=false;sx=e.clientX;sy=e.clientY;otx=tx;oty=ty;viewport.classList.add('panning');});
window.addEventListener('mousemove',e=>{if(!down)return;if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4)moved=true;tx=otx+(e.clientX-sx);ty=oty+(e.clientY-sy);apply();});
window.addEventListener('mouseup',()=>{viewport.classList.remove('panning');down=false;});
viewport.addEventListener('click',e=>{if(moved)return;const n=e.target.closest('.node');if(n)selectNode(n.dataset.id);else closeDrawer();});
viewport.addEventListener('wheel',e=>{e.preventDefault();const fct=e.deltaY<0?1.1:1/1.1,ns=Math.min(2.8,Math.max(0.2,scale*fct));
  const rx=(e.clientX-tx)/scale,ry=(e.clientY-ty)/scale;scale=ns;tx=e.clientX-rx*scale;ty=e.clientY-ry*scale;apply();},{passive:false});
let lt=null;
viewport.addEventListener('touchstart',e=>{if(e.touches.length===1)lt=[e.touches[0].clientX-tx,e.touches[0].clientY-ty];},{passive:true});
viewport.addEventListener('touchmove',e=>{if(lt&&e.touches.length===1){tx=e.touches[0].clientX-lt[0];ty=e.touches[0].clientY-lt[1];apply();}},{passive:true});
viewport.addEventListener('touchend',()=>lt=null);

const drawer=document.getElementById('drawer');
function selectNode(id){const o=nodeEls[id];if(!o)return;
  Object.values(nodeEls).forEach(x=>x.el.classList.remove('sel'));o.el.classList.add('sel');
  const n=o.node,role=ROLES[n.role],nt=n.notes||{};
  document.getElementById('dnum').textContent='// EKRĀNS '+String(n.n).padStart(2,'0');
  document.getElementById('dtitle').textContent=n.title;document.getElementById('dsub').textContent=n.sub||'';
  document.getElementById('drole').innerHTML='<i style="background:'+role.color+'"></i>'+role.label;
  let html='';
  if(nt.purpose)html+='<div class="sec"><h3>Mērķis</h3><p>'+nt.purpose+'</p></div>';
  if(nt.elements&&nt.elements.length)html+='<div class="sec"><h3>Galvenie elementi</h3><ul>'+nt.elements.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
  if(nt.states&&nt.states.length)html+='<div class="sec"><h3>Stāvokļi</h3><div class="tags">'+nt.states.map(x=>'<span class="tag">'+x+'</span>').join('')+'</div></div>';
  if(nt.emails&&nt.emails.length)html+='<div class="sec"><h3>Saistītie e-pasti</h3><div class="tags">'+nt.emails.map(x=>'<span class="tag">✉ '+x+'</span>').join('')+'</div></div>';
  document.getElementById('dbody').innerHTML=html;drawer.classList.add('open');}
function closeDrawer(){drawer.classList.remove('open');Object.values(nodeEls).forEach(x=>x.el.classList.remove('sel'));}
document.getElementById('dclose').onclick=closeDrawer;
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

function fit(){const pad=70;let mnX=1e9,mnY=1e9,mxX=-1e9,mxY=-1e9;
  Object.values(nodeEls).forEach(o=>{mnX=Math.min(mnX,o.node.x);mnY=Math.min(mnY,o.node.y);mxX=Math.max(mxX,o.node.x+o.w);mxY=Math.max(mxY,o.node.y+o.h+30);});
  const w=mxX-mnX,h=mxY-mnY,sw=window.innerWidth,sh=window.innerHeight;
  scale=Math.min(1.2,(sw-pad*2)/w,(sh-pad*2-70)/h);tx=(sw-w*scale)/2-mnX*scale;ty=(sh-h*scale)/2-mnY*scale+22;apply();}
document.getElementById('zin').onclick=()=>{scale=Math.min(2.8,scale*1.15);apply();};
document.getElementById('zout').onclick=()=>{scale=Math.max(0.2,scale/1.15);apply();};
document.getElementById('reset').onclick=fit;
drawEdges();fit();
</script>

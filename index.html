<!doctype html>
<html lang="lv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>BalticBid — Plūsmu karte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{--canvas:#F4F3F1;--ink:#1A1A1A;--muted:#8A8A86;--line:#E1DED7;--wire:#D7D4CD;--wire2:#ECEAE4;--accent:#FF601A;--card:#FFFFFF;--shadow:0 1px 2px rgba(0,0,0,.04),0 8px 24px -12px rgba(0,0,0,.12);}
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Geist',system-ui,sans-serif;color:var(--ink);background:var(--canvas)}
  .mono{font-family:'Geist Mono',ui-monospace,monospace}
  #viewport{position:fixed;inset:0;cursor:grab;background-image:radial-gradient(circle,#D9D6CF 1px,transparent 1.4px);background-size:26px 26px;}
  #viewport.panning{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}
  .cluster{position:absolute;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.30)}
  .cluster .clabel{position:absolute;top:-11px;left:22px;background:var(--canvas);padding:0 10px;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .cluster .cdot{width:7px;height:7px;border-radius:2px;display:inline-block;margin-right:7px}
  .node{position:absolute;z-index:2}
  .node .badge{position:absolute;top:-12px;left:-12px;width:26px;height:26px;border-radius:50%;background:var(--accent);color:#1A1A1A;font-family:'Geist Mono',monospace;font-weight:500;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 2px 6px rgba(0,0,0,.15)}
  .node .frame{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;transition:box-shadow .15s,border-color .15s;cursor:pointer}
  .node:hover .frame{border-color:#BDBAB2;box-shadow:0 2px 4px rgba(0,0,0,.05),0 14px 32px -14px rgba(0,0,0,.2)}
  .node.sel .frame{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent),0 14px 32px -12px rgba(255,96,26,.35)}
  .node .caption{margin-top:10px;text-align:center;font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--ink)}
  .node .sub{display:block;text-transform:none;letter-spacing:0;font-family:'Geist',sans-serif;font-size:11px;color:var(--muted);margin-top:3px}
  .node .ndot{position:absolute;top:-8px;right:-8px;width:16px;height:16px;border-radius:50%;background:#fff;border:1px solid var(--line);z-index:3;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  /* chrome */
  .browser .bar{height:22px;background:#F6F5F2;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:5px;padding:0 9px}
  .browser .dot{width:6px;height:6px;border-radius:50%}
  .browser .url{flex:1;height:13px;background:#fff;border:1px solid var(--line);border-radius:4px;margin-left:6px;display:flex;align-items:center;padding:0 6px;font-size:6px;color:#9A9A96}
  .phone{padding:7px;background:#EFEDE8;border-radius:22px}
  .phone .scr{border-radius:14px;overflow:hidden;background:#fff}
  .phone .notch{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:42px;height:5px;border-radius:3px;background:#CFCCC4;z-index:4}
  .desk .stand{height:14px;background:#EFEDE8;margin:0 auto;width:38%;border-radius:0 0 4px 4px}
  .desk .base{height:6px;background:#E1DED7;width:54%;margin:4px auto 0;border-radius:3px}

  /* ---- realistic mini-UI ---- */
  .ui{font-family:'Geist',sans-serif;color:#1A1A1A;font-size:6px;line-height:1.35}
  .ui .h{display:flex;align-items:center;gap:5px;height:15px;border-bottom:1px solid var(--line);padding:0 6px;background:#fff;flex:none}
  .ui .lg{font-weight:600;font-size:6.5px;letter-spacing:-.02em}
  .ui .lgm{width:6px;height:6px;background:var(--accent);border-radius:1px;flex:none}
  .ui .nav{color:#9A9A96;font-size:5.5px;white-space:nowrap}
  .ui .nav.act{color:#1A1A1A}
  .ui .sp{flex:1}
  .ui .glob{width:7px;height:7px;border:1px solid #9A9A96;border-radius:50%;flex:none}
  .ui .ham{width:8px;height:6px;flex:none;background:linear-gradient(#1A1A1A 1px,transparent 1px,transparent 2.5px,#1A1A1A 2.5px,#1A1A1A 3.5px,transparent 3.5px,transparent 5px,#1A1A1A 5px)}
  .ui .pill{font-size:5px;border:1px solid var(--line);border-radius:2px;padding:2px 4px;white-space:nowrap}
  .ui .pill.dark{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
  .ui .pad{padding:6px}
  .ui .ph{background:linear-gradient(#DCE2E6,#ECE8E1);position:relative;overflow:hidden;border-radius:2px}
  .ui .ph .sun{position:absolute;top:12%;right:16%;width:13%;aspect-ratio:1;border-radius:50%;background:#EAC9A2}
  .ui .ph .mach{position:absolute;left:30%;bottom:26%;width:40%;height:26%;background:#7E7A70;border-radius:1px}
  .ui .ph .mach::before{content:"";position:absolute;left:6%;bottom:-32%;width:24%;padding-bottom:24%;background:#56534b;border-radius:50%}
  .ui .ph .mach::after{content:"";position:absolute;right:8%;bottom:-42%;width:32%;padding-bottom:32%;background:#56534b;border-radius:50%}
  .ui .ph .grd{position:absolute;left:0;right:0;bottom:0;height:28%;background:linear-gradient(#C7C1B2,#B4AE9C)}
  .ui .lab{font-family:'Geist Mono',monospace;font-size:4.5px;letter-spacing:.06em;text-transform:uppercase;color:#9A9A96}
  .ui .t{font-weight:600}
  .ui .muted{color:#9A9A96}
  .ui .price{font-weight:600;letter-spacing:-.02em}
  .ui .big{font-weight:600;letter-spacing:-.03em;line-height:1}
  .ui .btn{height:11px;border-radius:2px;display:flex;align-items:center;justify-content:center;font-size:5px;font-weight:500;white-space:nowrap}
  .ui .btn.acc{background:var(--accent);color:#1A1A1A}
  .ui .btn.dark{background:#1A1A1A;color:#fff}
  .ui .btn.out{border:1px solid var(--line);background:#fff}
  .ui .fld{height:12px;border:1px solid var(--line);border-radius:2px;display:flex;align-items:center;padding:0 4px;font-size:5px;color:#9A9A96;background:#fff;margin:3px 0}
  .ui .fld.v{color:#1A1A1A;font-weight:500}
  .ui .tabs{display:flex;gap:3px}
  .ui .tab{font-size:5px;padding:2px 5px;border:1px solid var(--line);border-radius:2px;white-space:nowrap}
  .ui .tab.act{background:#1A1A1A;color:#fff;border-color:#1A1A1A}
  .ui .badge{font-size:4.5px;padding:1.5px 4px;border-radius:5px;white-space:nowrap;display:inline-block}
  .ui .badge.g{background:#D6EFD6;color:#236B23}
  .ui .badge.o{background:#FFE0D0;color:#B5430F}
  .ui .badge.n{background:#EAE7E0;color:#555}
  .ui .side{width:35%;border-right:1px solid var(--line);background:#FAFAF8;padding:5px;flex:none}
  .ui .si{font-size:5px;padding:2.5px 4px;color:#9A9A96;border-radius:2px;margin-bottom:1px}
  .ui .si.act{color:#fff;background:#1A1A1A;font-weight:500}
  .ui .g3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .ui .g2{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
  .ui .row{display:flex;gap:4px}
  .ui .col{display:flex;flex-direction:column}
  .ui .bdy{display:flex;height:calc(100% - 15px)}
  .ui .bdyb{display:flex;height:calc(100% - 37px)}
  .ui .main{padding:6px;flex:1;min-width:0}
  .ui table{width:100%;border-collapse:collapse;font-size:5px}
  .ui td{border-bottom:1px solid var(--wire2);padding:2.5px 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .ui td.b{font-weight:600}
  .ui .div{height:1px;background:var(--line);margin:5px 0}
  .ui .cnt{height:17px;border:1px solid var(--line);border-radius:2px;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:9px;flex:1;background:#FAFAF8}
  .ui .thumb{width:24px;height:16px;flex:none}
  .ui .panel{border:1px solid var(--line);border-radius:3px;padding:5px}
  .ui .toggle{width:14px;height:8px;border-radius:5px;background:var(--accent);position:relative;flex:none}
  .ui .toggle.off{background:var(--wire)}
  .ui .toggle::after{content:"";position:absolute;width:6px;height:6px;border-radius:50%;background:#fff;top:1px;right:1px}
  .ui .toggle.off::after{right:auto;left:1px}
  .ui .ico{width:11px;height:11px;border-radius:2px;background:#FFE0D0;flex:none}
  .ui .stat{border:1px solid var(--line);border-radius:3px;padding:4px}

  /* toolbar */
  #bar{position:fixed;top:16px;left:16px;right:16px;display:flex;align-items:center;gap:14px;z-index:100;pointer-events:none}
  #bar .panel{pointer-events:auto;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
  #title{padding:10px 16px;display:flex;align-items:center;gap:12px}
  #title .mark{width:18px;height:18px;background:var(--accent);border-radius:3px}
  #title b{font-weight:600;font-size:15px;letter-spacing:-.01em}
  #title span{font-size:12px;color:var(--muted)}
  #legend{margin-left:auto;display:flex;gap:16px;padding:9px 16px;font-size:11.5px;align-items:center}
  #legend .lg{display:flex;align-items:center;gap:7px}
  #legend .sw{width:10px;height:10px;border-radius:3px}
  #ctrls{display:flex;gap:6px;padding:7px}
  #ctrls button{pointer-events:auto;width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;font-size:16px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
  #ctrls button:hover{border-color:var(--ink)}
  #ctrls button.wide{width:auto;padding:0 12px;font-size:12px;font-family:'Geist Mono',monospace;letter-spacing:.04em}
  /* drawer */
  #drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:88vw;background:#fff;border-left:1px solid var(--line);box-shadow:-12px 0 40px -18px rgba(0,0,0,.25);transform:translateX(100%);transition:transform .26s cubic-bezier(.16,1,.3,1);z-index:200;display:flex;flex-direction:column}
  #drawer.open{transform:translateX(0)}
  #drawer .dh{padding:22px 22px 16px;border-bottom:1px solid var(--line)}
  #drawer .dnum{font-family:'Geist Mono',monospace;font-size:12px;color:var(--accent)}
  #drawer h2{margin:6px 0 4px;font-size:21px;letter-spacing:-.02em}
  #drawer .dsub{font-size:13px;color:var(--muted)}
  #drawer .rolechip{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:6px;background:#F4F3F1;color:var(--ink)}
  #drawer .rolechip i{width:7px;height:7px;border-radius:2px;font-style:normal}
  #drawer .db{padding:20px 22px;overflow:auto;flex:1}
  #drawer .sec{margin-bottom:20px}
  #drawer .sec h3{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 9px}
  #drawer .sec p{margin:0;font-size:13.5px;line-height:1.55;color:#333}
  #drawer ul{margin:0;padding:0;list-style:none}
  #drawer li{font-size:13px;line-height:1.5;color:#333;padding-left:16px;position:relative;margin-bottom:6px}
  #drawer li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  #drawer .tags{display:flex;flex-wrap:wrap;gap:6px}
  #drawer .tag{font-size:11.5px;padding:4px 9px;border-radius:6px;background:#F4F3F1;border:1px solid var(--line);color:#444}
  #drawer .dclose{position:absolute;top:18px;right:18px;width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:15px;color:var(--muted)}
  #drawer .dclose:hover{border-color:var(--ink);color:var(--ink)}
  #hint{position:fixed;bottom:16px;left:16px;z-index:100;font-size:11.5px;color:var(--muted);background:rgba(255,255,255,.8);border:1px solid var(--line);border-radius:8px;padding:8px 12px;backdrop-filter:blur(8px)}
  #foot{position:fixed;bottom:16px;right:16px;z-index:100;font-family:'Geist Mono',monospace;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div id="bar">
  <div class="panel" id="title"><div class="mark"></div><b>BalticBid</b><span>Plūsmu karte · v3.0</span></div>
  <div class="panel" id="legend">
    <div class="lg"><span class="sw" style="background:#FF601A"></span>Galvenā plūsma</div>
    <div class="lg"><span class="sw" style="background:#C9C6BF"></span>Saistīta</div>
    <div class="lg"><span class="sw" style="background:#fff;border:1px dashed #B9B6AE"></span>Sekundāra</div>
  </div>
  <div class="panel" id="ctrls"><button id="zin">+</button><button id="zout">−</button><button id="reset" class="wide">FIT</button></div>
</div>
<div id="viewport"><div id="world"><svg id="edges"><defs>
  <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#C9C6BF"></path></marker>
  <marker id="arrA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#FF601A"></path></marker>
</defs></svg></div></div>
<aside id="drawer"><button class="dclose" id="dclose">✕</button>
  <div class="dh"><div class="dnum" id="dnum"></div><h2 id="dtitle"></h2><div class="dsub" id="dsub"></div><div class="rolechip" id="drole"></div></div>
  <div class="db" id="dbody"></div>
</aside>
<div id="hint">Velc fonu, lai pārvietotos · ritini, lai tuvinātu · klikšķini ekrānu, lai redzētu piezīmes</div>
<div id="foot">BALTICBID · WIREFRAME FLOW</div>

<script>
const ROLES={public:{label:'Publisks',color:'#3A3A3A'},user:{label:'Lietotājs',color:'#FF601A'},admin:{label:'Admin',color:'#7A7A76'},system:{label:'Sistēma',color:'#B0ADA6'}};

// ---------- realistic UI builders ----------
const PH=(h)=>`<div class="ph" style="height:${h}px"><div class="sun"></div><div class="mach"></div><div class="grd"></div></div>`;
function headB(act){return `<div class="bar"><div class="dot" style="background:#E08585"></div><div class="dot" style="background:#E0C285"></div><div class="dot" style="background:#9FD09F"></div><div class="url">balticbid.lv</div></div>`+
  `<div class="h"><div class="lgm"></div><div class="lg">BalticBid</div><div class="nav ${act==='cat'?'act':''}">Katalogs</div><div class="nav">Kā tas strādā</div><div class="sp"></div><div class="glob"></div><div class="pill">Ienākt</div><div class="pill dark">Reģistrēties</div></div>`}
function headP(){return `<div class="h"><div class="lgm"></div><div class="lg">BalticBid</div><div class="sp"></div><div class="glob"></div><div class="ham"></div></div>`}
function headA(act){const items=['Pārskats','Loti','Lietotāji','Dokumenti','Kategorijas'];
  return `<div class="bar"><div class="dot" style="background:#E08585"></div><div class="dot" style="background:#E0C285"></div><div class="dot" style="background:#9FD09F"></div><div class="url">balticbid.lv/admin</div></div>`}
function adminSide(act){const items=['Pārskats','Loti','Lietotāji','Dokumenti','Kategorijas'];
  return `<div class="side"><div class="row" style="align-items:center;gap:3px;margin-bottom:4px"><div class="lgm"></div><span class="lg" style="font-size:5.5px">BalticBid</span><span class="badge o" style="margin-left:auto">Admin</span></div>${items.map((t,i)=>`<div class="si ${i===act?'act':''}">${t}</div>`).join('')}</div>`}
function profSide(act){const items=['Pamatdati','Mani solījumi','Favorīti','Dokumenti','Iestatījumi','Drošība'];
  return `<div class="side"><div class="row" style="align-items:center;gap:3px;margin-bottom:5px"><div style="width:11px;height:11px;border-radius:50%;background:#1A1A1A;color:#fff;font-size:4.5px;display:flex;align-items:center;justify-content:center;flex:none">JB</div><span class="t" style="font-size:5px">Jānis B.</span></div>${items.map((t,i)=>`<div class="si ${i===act?'act':''}">${t}</div>`).join('')}</div>`}
const pcard=(by,nm,pr)=>`<div class="col">${PH(26)}<div class="lab" style="margin-top:3px">${by}</div><div class="t" style="font-size:5.5px">${nm}</div><div class="price" style="font-size:6.5px">${pr}</div></div>`;
const PRODS=[['CLAAS · 2020','Arion 650','71 000 €'],['NEW HOLLAND · 2017','T7.270','58 200 €'],['DEUTZ-FAHR · 2015','6155','19 500 €'],['JOHN DEERE · 2019','6155M','52 900 €'],['FENDT · 2016','724 Vario','54 000 €'],['KRONE · 2019','BiG Pack','67 000 €']];
const grid=(n)=>`<div class="g3">${PRODS.slice(0,n).map(p=>pcard(p[0],p[1],p[2])).join('')}</div>`;

const TPL={
  catalog:()=>headB('cat')+`<div class="bdyb"><div class="side"><div class="t" style="font-size:5.5px;margin-bottom:3px">Filtri</div><div class="lab">Kārtot</div><div class="fld v">Tuvākais beigām</div><div class="lab" style="margin-top:3px">Marka</div><div class="fld"></div><div class="lab" style="margin-top:3px">Cena, €</div><div class="row"><div class="fld" style="flex:1">No</div><div class="fld" style="flex:1">Līdz</div></div></div><div class="main"><div class="row" style="justify-content:space-between;align-items:center;margin-bottom:4px"><span class="muted">8 rezultāti</span><span class="pill">Tuvākais beigām ⌄</span></div>${grid(6)}</div></div>`,
  search:()=>headB()+`<div class="pad"><div class="row" style="align-items:center;margin-bottom:4px"><div class="fld" style="flex:1;margin:0">Meklēt „John Deere”…</div><div class="btn dark" style="width:30px">Meklēt</div></div><div class="muted" style="margin-bottom:4px">12 rezultāti</div>${grid(6)}</div>`,
  category:()=>headB()+`<div class="pad"><div class="t" style="font-size:8px;margin-bottom:3px">Traktori</div><div class="tabs" style="margin-bottom:5px"><span class="tab act">Visi</span><span class="tab">John Deere</span><span class="tab">CLAAS</span><span class="tab">Fendt</span></div>${grid(6)}</div>`,
  detail:()=>headB()+`<div class="row" style="padding:6px;gap:6px;height:calc(100% - 37px)"><div style="flex:1.25">${PH(54)}<div class="row" style="margin-top:4px">${PH(13).replace('class="ph"','class="ph thumb"').repeat(4)}</div><div class="lab" style="margin-top:5px">CLAAS · TRAKTORI</div><div class="t" style="font-size:8px">CLAAS Arion 650</div><div class="div"></div><div class="row" style="gap:5px">${[['Gads','2020'],['Mst.','1 850'],['Stāv.','Labs'],['Vieta','Tartu']].map(s=>`<div class="col"><div class="lab">${s[0]}</div><div class="t" style="font-size:5px">${s[1]}</div></div>`).join('')}</div></div><div style="flex:1" class="panel"><div class="lab">Pašreizējā cena</div><div class="big" style="font-size:12px">71 000 €</div><div class="muted" style="font-size:5px">9 solījumi · solis 1 000 €</div><div class="badge o" style="margin-top:3px">Rezerve nav sasniegta</div><div class="div"></div><div class="lab">Beidzas pēc</div><div class="row" style="margin:3px 0">${['00','01','58','12'].map(x=>`<div class="cnt">${x}</div>`).join('')}</div><div class="fld v">72 000 €</div><div class="btn acc" style="margin-top:3px">Solīt 72 000 €</div><div class="muted" style="font-size:4.5px;margin-top:3px">+ pircēja prēmija 5%</div></div></div>`,

const world=document.getElementById('world'),svg=document.getElementById('edges'),viewport=document.getElementById('viewport');
const nodeEls={};
function deviceHTML(node){const inner=(TPL[node.kind]||(()=>''))();
  if(node.dev==='phone')return '<div class="frame phone"><div class="scr ui" style="height:'+(SIZE.phone.h-14)+'px"><div class="notch"></div>'+inner+'</div></div>';
  if(node.dev==='desk')return '<div><div class="frame browser ui" style="border-radius:8px;height:'+SIZE.desk.h+'px">'+inner+'</div><div class="stand"></div><div class="base"></div></div>';
  return '<div class="frame browser ui" style="height:'+SIZE.browser.h+'px">'+inner+'</div>';}
CLUSTERS.forEach(cl=>{const d=document.createElement('div');d.className='cluster';
  d.style.cssText='left:'+cl.x+'px;top:'+cl.y+'px;width:'+cl.w+'px;height:'+cl.h+'px;z-index:0';
  d.innerHTML='<div class="clabel"><span class="cdot" style="background:'+cl.color+'"></span>'+cl.label+'</div>';world.appendChild(d);});
NODES.forEach(node=>{const el=document.createElement('div');el.className='node';el.dataset.id=node.id;
  const sz=SIZE[node.dev];el.style.cssText='left:'+node.x+'px;top:'+node.y+'px;width:'+sz.w+'px';
  el.innerHTML='<div class="badge">'+node.n+'</div><div class="ndot">i</div>'+deviceHTML(node)+
    '<div class="caption">'+node.title+(node.sub?'<span class="sub">'+node.sub+'</span>':'')+'</div>';
  world.appendChild(el);nodeEls[node.id]={el,node,w:sz.w,h:(node.dev==='phone'?SIZE.phone.h:SIZE[node.dev].h)};});

function anchor(o,side){const n=o.node,w=o.w,h=o.h,cx=n.x+w/2,cy=n.y+h/2;
  if(side==='r')return[n.x+w,cy,1,0];if(side==='l')return[n.x,cy,-1,0];if(side==='t')return[cx,n.y,0,-1];return[cx,n.y+h,0,1];}
function drawEdges(){let p=svg.querySelector('defs').outerHTML;
  EDGES.forEach(e=>{const A=nodeEls[e.f],B=nodeEls[e.t];if(!A||!B)return;
    const[ax,ay,adx,ady]=anchor(A,e.a),[bx,by,bdx,bdy]=anchor(B,e.b);
    const dist=Math.hypot(bx-ax,by-ay),k=Math.min(130,dist*0.45);
    const c1x=ax+adx*k,c1y=ay+ady*k,c2x=bx+bdx*k,c2y=by+bdy*k;
    const color=e.type==='main'?'#FF601A':'#C9C6BF',dash=e.type==='sec'?'stroke-dasharray="5 5"':'';
    const wdt=e.type==='main'?2:1.4,op=e.type==='sec'?0.75:1,mk=e.type==='main'?'url(#arrA)':'url(#arr)';
    p+='<path d="M'+ax+','+ay+' C'+c1x+','+c1y+' '+c2x+','+c2y+' '+bx+','+by+'" fill="none" stroke="'+color+'" stroke-width="'+wdt+'" opacity="'+op+'" '+dash+' marker-end="'+mk+'"></path>';});
  svg.innerHTML=p;}

let tx=0,ty=0,scale=1;
function apply(){world.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';}
let down=false,moved=false,sx=0,sy=0,otx=0,oty=0;
viewport.addEventListener('mousedown',e=>{down=true;moved=false;sx=e.clientX;sy=e.clientY;otx=tx;oty=ty;viewport.classList.add('panning');});
window.addEventListener('mousemove',e=>{if(!down)return;if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4)moved=true;tx=otx+(e.clientX-sx);ty=oty+(e.clientY-sy);apply();});
window.addEventListener('mouseup',()=>{viewport.classList.remove('panning');down=false;});
viewport.addEventListener('click',e=>{if(moved)return;const n=e.target.closest('.node');if(n)selectNode(n.dataset.id);else closeDrawer();});
viewport.addEventListener('wheel',e=>{e.preventDefault();const fct=e.deltaY<0?1.1:1/1.1,ns=Math.min(2.6,Math.max(0.22,scale*fct));
  const rx=(e.clientX-tx)/scale,ry=(e.clientY-ty)/scale;scale=ns;tx=e.clientX-rx*scale;ty=e.clientY-ry*scale;apply();},{passive:false});
let lt=null;
viewport.addEventListener('touchstart',e=>{if(e.touches.length===1)lt=[e.touches[0].clientX-tx,e.touches[0].clientY-ty];},{passive:true});
viewport.addEventListener('touchmove',e=>{if(lt&&e.touches.length===1){tx=e.touches[0].clientX-lt[0];ty=e.touches[0].clientY-lt[1];apply();}},{passive:true});
viewport.addEventListener('touchend',()=>lt=null);

const drawer=document.getElementById('drawer');
function selectNode(id){const o=nodeEls[id];if(!o)return;
  Object.values(nodeEls).forEach(x=>x.el.classList.remove('sel'));o.el.classList.add('sel');
  const n=o.node,role=ROLES[n.role],nt=n.notes||{};
  document.getElementById('dnum').textContent='// EKRĀNS '+String(n.n).padStart(2,'0');
  document.getElementById('dtitle').textContent=n.title;document.getElementById('dsub').textContent=n.sub||'';
  document.getElementById('drole').innerHTML='<i style="background:'+role.color+'"></i>'+role.label;
  let html='';
  if(nt.purpose)html+='<div class="sec"><h3>Mērķis</h3><p>'+nt.purpose+'</p></div>';
  if(nt.elements&&nt.elements.length)html+='<div class="sec"><h3>Galvenie elementi</h3><ul>'+nt.elements.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
  if(nt.states&&nt.states.length)html+='<div class="sec"><h3>Stāvokļi</h3><div class="tags">'+nt.states.map(x=>'<span class="tag">'+x+'</span>').join('')+'</div></div>';
  if(nt.emails&&nt.emails.length)html+='<div class="sec"><h3>Saistītie e-pasti</h3><div class="tags">'+nt.emails.map(x=>'<span class="tag">✉ '+x+'</span>').join('')+'</div></div>';
  document.getElementById('dbody').innerHTML=html;drawer.classList.add('open');}
function closeDrawer(){drawer.classList.remove('open');Object.values(nodeEls).forEach(x=>x.el.classList.remove('sel'));}
document.getElementById('dclose').onclick=closeDrawer;
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

function fit(){const pad=70;let mnX=1e9,mnY=1e9,mxX=-1e9,mxY=-1e9;
  Object.values(nodeEls).forEach(o=>{mnX=Math.min(mnX,o.node.x);mnY=Math.min(mnY,o.node.y);mxX=Math.max(mxX,o.node.x+o.w);mxY=Math.max(mxY,o.node.y+o.h+30);});
  const w=mxX-mnX,h=mxY-mnY,sw=window.innerWidth,sh=window.innerHeight;
  scale=Math.min(1.2,(sw-pad*2)/w,(sh-pad*2-70)/h);tx=(sw-w*scale)/2-mnX*scale;ty=(sh-h*scale)/2-mnY*scale+22;apply();}
document.getElementById('zin').onclick=()=>{scale=Math.min(2.6,scale*1.15);apply();};
document.getElementById('zout').onclick=()=>{scale=Math.max(0.22,scale/1.15);apply();};
document.getElementById('reset').onclick=fit;
drawEdges();fit();
</script>
</body>
</html>

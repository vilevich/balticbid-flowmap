<!doctype html>
<html lang="lv">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>BalticBid — Plūsmu karte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --canvas:#F4F3F1; --ink:#1A1A1A; --muted:#8A8A86; --line:#E1DED7;
    --wire:#D7D4CD; --wire2:#ECEAE4; --accent:#FF601A; --card:#FFFFFF;
    --shadow:0 1px 2px rgba(0,0,0,.04), 0 8px 24px -12px rgba(0,0,0,.12);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;font-family:'Geist',system-ui,sans-serif;color:var(--ink);background:var(--canvas)}
  .mono{font-family:'Geist Mono',ui-monospace,monospace}

  #viewport{position:fixed;inset:0;cursor:grab;
    background-image:radial-gradient(circle, #D9D6CF 1px, transparent 1.4px);
    background-size:26px 26px;}
  #viewport.panning{cursor:grabbing}
  #world{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
  #edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none}

  .cluster{position:absolute;border:1px dashed var(--line);border-radius:18px;background:rgba(255,255,255,.30)}
  .cluster .clabel{position:absolute;top:-11px;left:22px;background:var(--canvas);padding:0 10px;
    font-family:'Geist Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .cluster .cdot{width:7px;height:7px;border-radius:2px;display:inline-block;margin-right:7px}

  .node{position:absolute;z-index:2}
  .node .badge{position:absolute;top:-12px;left:-12px;width:26px;height:26px;border-radius:50%;
    background:var(--accent);color:#1A1A1A;font-family:'Geist Mono',monospace;font-weight:500;font-size:12px;
    display:flex;align-items:center;justify-content:center;z-index:3;box-shadow:0 2px 6px rgba(0,0,0,.15)}
  .node .frame{background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow);overflow:hidden;
    transition:box-shadow .15s, border-color .15s;cursor:pointer}
  .node:hover .frame{border-color:#BDBAB2;box-shadow:0 2px 4px rgba(0,0,0,.05),0 14px 32px -14px rgba(0,0,0,.2)}
  .node.sel .frame{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent),0 14px 32px -12px rgba(255,96,26,.35)}
  .node .caption{margin-top:10px;text-align:center;font-family:'Geist Mono',monospace;font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;color:var(--ink)}
  .node .sub{display:block;text-transform:none;letter-spacing:0;font-family:'Geist',sans-serif;font-size:11px;color:var(--muted);margin-top:3px}
  .node .ndot{position:absolute;top:-8px;right:-8px;width:16px;height:16px;border-radius:50%;background:#fff;border:1px solid var(--line);
    z-index:3;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);box-shadow:0 1px 3px rgba(0,0,0,.1)}

  .scr{position:relative;background:#fff}
  .browser .bar{height:22px;background:#F6F5F2;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:5px;padding:0 9px}
  .browser .dot{width:6px;height:6px;border-radius:50%}
  .browser .url{flex:1;height:11px;background:#fff;border:1px solid var(--line);border-radius:4px;margin-left:6px}
  .phone{padding:7px;background:#EFEDE8;border-radius:22px}
  .phone .scr{border-radius:14px;overflow:hidden}
  .phone .notch{position:absolute;top:6px;left:50%;transform:translateX(-50%);width:42px;height:5px;border-radius:3px;background:#CFCCC4;z-index:2}
  .desk .stand{height:14px;background:#EFEDE8;margin:0 auto;width:38%;border-radius:0 0 4px 4px}
  .desk .base{height:6px;background:#E1DED7;width:54%;margin:4px auto 0;border-radius:3px}

  .wbar{height:16px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:5px;padding:0 7px}
  .logo{width:9px;height:9px;background:var(--accent);border-radius:1px;flex:none}
  .navd{width:22px;height:5px;background:var(--wire);border-radius:2px;flex:none}
  .pad{padding:9px}
  .img{background:var(--wire2);border:1px solid var(--wire);position:relative;border-radius:2px}
  .img::before,.img::after{content:"";position:absolute;inset:0;background:linear-gradient(to top right,transparent 49%,var(--wire) 49.5%,var(--wire) 50.5%,transparent 51%)}
  .img::after{background:linear-gradient(to bottom right,transparent 49%,var(--wire) 49.5%,var(--wire) 50.5%,transparent 51%)}
  .ln{height:5px;background:var(--wire);border-radius:2px;margin:4px 0}
  .blk{background:var(--wire2);border:1px solid var(--wire);border-radius:3px}
  .btn{height:13px;background:#3A3A3A;border-radius:3px}
  .btn.acc{background:var(--accent)}
  .btn.out{background:#fff;border:1px solid var(--wire)}
  .row{display:flex;gap:6px}
  .col{display:flex;flex-direction:column}
  .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:5px}
  .chip{height:8px;border-radius:5px;background:var(--wire)}
  .chip.g{background:#CDEBCD}.chip.o{background:#FFD9C7}.chip.r{background:#F2CFCF}
  .field{height:11px;background:#fff;border:1px solid var(--wire);border-radius:3px;margin:4px 0}
  .circle{border-radius:50%;background:var(--accent);margin:0 auto}
  .side{width:32%;border-right:1px solid var(--line);padding:6px;background:#FAFAF8}
  .modalwrap{position:absolute;inset:0;background:rgba(20,20,20,.18);display:flex;align-items:center;justify-content:center}
  .modal{width:78%;background:#fff;border:1px solid var(--line);border-radius:6px;padding:8px;box-shadow:0 8px 20px -8px rgba(0,0,0,.3)}
  table.wt{width:100%;border-collapse:collapse}
  table.wt td{border-bottom:1px solid var(--wire2);padding:3px 4px}

  /* Toolbar */
  #bar{position:fixed;top:16px;left:16px;right:16px;display:flex;align-items:center;gap:14px;z-index:100;pointer-events:none}
  #bar .panel{pointer-events:auto;background:rgba(255,255,255,.86);backdrop-filter:blur(10px);
    border:1px solid var(--line);border-radius:10px;box-shadow:var(--shadow)}
  #title{padding:10px 16px;display:flex;align-items:center;gap:12px}
  #title .mark{width:18px;height:18px;background:var(--accent);border-radius:3px}
  #title b{font-weight:600;font-size:15px;letter-spacing:-.01em}
  #title span{font-size:12px;color:var(--muted)}
  #legend{margin-left:auto;display:flex;gap:16px;padding:9px 16px;font-size:11.5px;align-items:center}
  #legend .lg{display:flex;align-items:center;gap:7px}
  #legend .sw{width:10px;height:10px;border-radius:3px}
  #ctrls{display:flex;gap:6px;padding:7px}
  #ctrls button{pointer-events:auto;width:34px;height:34px;border:1px solid var(--line);background:#fff;border-radius:8px;
    font-size:16px;color:var(--ink);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
  #ctrls button:hover{border-color:var(--ink)}
  #ctrls button.wide{width:auto;padding:0 12px;font-size:12px;font-family:'Geist Mono',monospace;letter-spacing:.04em}

  /* Drawer */
  #drawer{position:fixed;top:0;right:0;height:100%;width:380px;max-width:88vw;background:#fff;border-left:1px solid var(--line);
    box-shadow:-12px 0 40px -18px rgba(0,0,0,.25);transform:translateX(100%);transition:transform .26s cubic-bezier(.16,1,.3,1);z-index:200;display:flex;flex-direction:column}
  #drawer.open{transform:translateX(0)}
  #drawer .dh{padding:22px 22px 16px;border-bottom:1px solid var(--line)}
  #drawer .dnum{font-family:'Geist Mono',monospace;font-size:12px;color:var(--accent)}
  #drawer h2{margin:6px 0 4px;font-size:21px;letter-spacing:-.02em}
  #drawer .dsub{font-size:13px;color:var(--muted)}
  #drawer .rolechip{display:inline-flex;align-items:center;gap:6px;margin-top:12px;font-family:'Geist Mono',monospace;font-size:10.5px;
    letter-spacing:.08em;text-transform:uppercase;padding:4px 9px;border-radius:6px;background:#F4F3F1;color:var(--ink)}
  #drawer .rolechip i{width:7px;height:7px;border-radius:2px;font-style:normal}
  #drawer .db{padding:20px 22px;overflow:auto;flex:1}
  #drawer .sec{margin-bottom:20px}
  #drawer .sec h3{font-family:'Geist Mono',monospace;font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:0 0 9px}
  #drawer .sec p{margin:0;font-size:13.5px;line-height:1.55;color:#333}
  #drawer ul{margin:0;padding:0;list-style:none}
  #drawer li{font-size:13px;line-height:1.5;color:#333;padding-left:16px;position:relative;margin-bottom:6px}
  #drawer li::before{content:"";position:absolute;left:0;top:8px;width:5px;height:5px;border-radius:50%;background:var(--accent)}
  #drawer .tags{display:flex;flex-wrap:wrap;gap:6px}
  #drawer .tag{font-size:11.5px;padding:4px 9px;border-radius:6px;background:#F4F3F1;border:1px solid var(--line);color:#444}
  #drawer .dclose{position:absolute;top:18px;right:18px;width:30px;height:30px;border:1px solid var(--line);border-radius:8px;background:#fff;cursor:pointer;font-size:15px;color:var(--muted)}
  #drawer .dclose:hover{border-color:var(--ink);color:var(--ink)}

  #hint{position:fixed;bottom:16px;left:16px;z-index:100;font-size:11.5px;color:var(--muted);
    background:rgba(255,255,255,.8);border:1px solid var(--line);border-radius:8px;padding:8px 12px;backdrop-filter:blur(8px)}
  #foot{position:fixed;bottom:16px;right:16px;z-index:100;font-family:'Geist Mono',monospace;font-size:11px;color:var(--muted)}
</style>
</head>
<body>
<div id="bar">
  <div class="panel" id="title"><div class="mark"></div><b>BalticBid</b><span>Plūsmu karte · v2.0</span></div>
  <div class="panel" id="legend">
    <div class="lg"><span class="sw" style="background:#FF601A"></span>Galvenā plūsma</div>
    <div class="lg"><span class="sw" style="background:#C9C6BF"></span>Saistīta</div>
    <div class="lg"><span class="sw" style="background:#fff;border:1px dashed #B9B6AE"></span>Sekundāra</div>
  </div>
  <div class="panel" id="ctrls">
    <button id="zin" title="Pietuvināt">+</button>
    <button id="zout" title="Attālināt">−</button>
    <button id="reset" class="wide" title="Atiestatīt skatu">FIT</button>
  </div>
</div>

<div id="viewport">
  <div id="world">
    <svg id="edges">
      <defs>
        <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#C9C6BF"></path></marker>
        <marker id="arrA" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="userSpaceOnUse"><path d="M0,0 L7,3 L0,6 Z" fill="#FF601A"></path></marker>
      </defs>
    </svg>
  </div>
</div>

<aside id="drawer">
  <button class="dclose" id="dclose">✕</button>
  <div class="dh">
    <div class="dnum" id="dnum"></div>
    <h2 id="dtitle"></h2>
    <div class="dsub" id="dsub"></div>
    <div class="rolechip" id="drole"></div>
  </div>
  <div class="db" id="dbody"></div>
</aside>

<div id="hint">Velc fonu, lai pārvietotos · ritini, lai tuvinātu · klikšķini ekrānu, lai redzētu piezīmes</div>
<div id="foot">BALTICBID · WIREFRAME FLOW</div>

<script>
const ROLES = {
  public:{label:'Publisks',color:'#3A3A3A'},
  user:{label:'Lietotājs',color:'#FF601A'},
  admin:{label:'Admin',color:'#7A7A76'},
  system:{label:'Sistēma',color:'#B0ADA6'},
};

// ---------- wireframe builders ----------
const r=(n,w='100%')=>('<div class="ln" style="width:'+w+'"></div>').repeat(n);
const f=(n=1)=>'<div class="field"></div>'.repeat(n);
function bar(){return '<div class="wbar"><div class="logo"></div><div class="navd"></div><div class="navd" style="width:14px"></div><div style="flex:1"></div><div class="blk" style="width:16px;height:8px"></div><div class="blk" style="width:18px;height:8px"></div></div>'}
function bbar(){return '<div class="bar"><div class="dot" style="background:#E08585"></div><div class="dot" style="background:#E0C285"></div><div class="dot" style="background:#9FD09F"></div><div class="url"></div></div>'}
function sideNav(active,count=5){let s='<div class="side"><div class="blk" style="height:13px;margin-bottom:7px"></div>';for(let i=0;i<count;i++){s+='<div class="ln" style="margin:7px 0;width:'+(i===active?'90%':'75%')+';background:'+(i===active?'#3A3A3A':'var(--wire)')+'"></div>'}return s+'</div>'}
function listRow(chip){return '<div class="blk" style="height:24px;margin-bottom:6px;display:flex;align-items:center;gap:6px;padding:4px"><div class="img" style="width:26px;height:16px"></div><div class="col" style="flex:1"><div class="ln" style="width:75%"></div><div class="ln" style="width:45%"></div></div>'+(chip?'<div class="chip '+chip+'" style="width:30px"></div>':'')+'</div>'}
function tableRows(n){let s='<table class="wt">';for(let i=0;i<n;i++)s+='<tr><td><div class="ln" style="width:80%;margin:0"></div></td><td><div class="ln" style="width:50%;margin:0"></div></td><td style="width:24px"><div class="chip" style="width:20px"></div></td></tr>';return s+'</table>'}

const TPL = {
  // ---- Public / catalog ----
  catalog:()=>bbar()+bar()+'<div style="display:flex;height:calc(100% - 38px)"><div class="side"><div class="ln" style="width:50%"></div><div class="field"></div><div class="ln" style="width:50%;margin-top:7px"></div><div class="field"></div><div class="ln" style="width:50%;margin-top:7px"></div><div class="field"></div></div><div class="pad" style="flex:1"><div class="row" style="justify-content:space-between;margin-bottom:5px"><div class="ln" style="width:30px"></div><div class="blk" style="width:46px;height:9px"></div></div><div class="grid3">'+('<div class="col"><div class="img" style="height:28px"></div><div class="ln" style="width:90%;margin-top:3px"></div><div class="ln" style="width:55%"></div></div>'.repeat(6))+'</div></div></div>',
  search:()=>bbar()+bar()+'<div class="pad"><div class="row" style="align-items:center;gap:5px;margin-bottom:6px"><div class="field" style="flex:1;margin:0"></div><div class="blk" style="width:22px;height:11px"></div></div><div class="ln" style="width:35%"></div><div class="grid3" style="margin-top:5px">'+('<div class="col"><div class="img" style="height:26px"></div><div class="ln" style="width:80%;margin-top:3px"></div></div>'.repeat(6))+'</div></div>',
  category:()=>bbar()+bar()+'<div class="pad"><div class="ln" style="width:45%;height:8px"></div><div class="row" style="gap:5px;margin:6px 0">'+('<div class="chip" style="width:38px;height:11px"></div>'.repeat(4))+'</div><div class="grid3">'+('<div class="col"><div class="img" style="height:28px"></div><div class="ln" style="width:85%;margin-top:3px"></div><div class="ln" style="width:50%"></div></div>'.repeat(6))+'</div></div>',
  detail:()=>bbar()+bar()+'<div style="display:flex;gap:8px;padding:8px;height:calc(100% - 38px)"><div style="flex:1.3"><div class="img" style="height:60px"></div><div class="row" style="margin-top:5px">'+('<div class="blk" style="width:20px;height:15px"></div>'.repeat(4))+'</div><div class="ln" style="width:70%;margin-top:6px"></div><div class="row" style="margin-top:6px">'+('<div class="col" style="flex:1"><div class="ln" style="width:60%"></div><div class="ln" style="width:80%"></div></div>'.repeat(3))+'</div><div class="ln" style="width:90%;margin-top:6px"></div><div class="ln" style="width:80%"></div></div><div style="flex:1;border:1px solid var(--line);border-radius:4px;padding:7px"><div class="ln" style="width:50%"></div><div class="ln" style="width:70%;height:9px;background:#3A3A3A"></div><div class="ln" style="width:55%;background:var(--accent);opacity:.5"></div><div class="row" style="margin-top:6px">'+('<div class="blk" style="flex:1;height:16px"></div>'.repeat(4))+'</div><div class="field" style="margin-top:6px"></div><div class="btn acc" style="margin-top:5px"></div></div></div>',
  modal:()=>bar()+'<div class="scr" style="height:230px;position:relative;background:#F2F1EE"><div class="modalwrap"><div class="modal"><div class="ln" style="width:60%;height:7px"></div><div class="ln" style="width:80%"></div><div class="blk" style="height:36px;margin:7px 0;padding:5px"><div class="row" style="justify-content:space-between"><div class="ln" style="width:40%;margin:2px 0"></div><div class="ln" style="width:25%;margin:2px 0"></div></div><div class="row" style="justify-content:space-between"><div class="ln" style="width:35%;margin:2px 0"></div><div class="ln" style="width:25%;margin:2px 0;background:#3A3A3A"></div></div></div><div class="row" style="align-items:center;gap:4px"><div class="blk" style="width:9px;height:9px"></div><div class="ln" style="flex:1;margin:0"></div></div><div class="row" style="margin-top:7px"><div class="btn out" style="flex:1"></div><div class="btn acc" style="flex:1"></div></div></div></div></div>',
  history:()=>bar()+'<div class="scr" style="height:230px;background:#F2F1EE;position:relative"><div class="modalwrap"><div class="modal" style="width:84%"><div class="ln" style="width:55%;height:7px;margin-bottom:6px"></div>'+tableRows(6)+'</div></div></div>',
  qa:()=>bbar()+bar()+'<div class="pad"><div class="ln" style="width:40%;height:7px"></div>'+('<div class="blk" style="height:22px;margin-top:6px;padding:4px"><div class="ln" style="width:70%;margin:1px 0"></div><div class="ln" style="width:50%;margin:1px 0"></div></div>'.repeat(3))+'<div class="row" style="margin-top:6px"><div class="field" style="flex:1;margin:0"></div><div class="btn acc" style="width:34px"></div></div></div>',
  win:()=>bbar()+bar()+'<div class="pad"><div class="blk" style="height:16px;background:#CDEBCD;border-color:#A9D9A9;margin-bottom:7px"></div><div class="row" style="gap:8px"><div class="img" style="width:44%;height:44px"></div><div class="col" style="flex:1"><div class="ln" style="width:80%"></div><div class="ln" style="width:55%"></div><div class="ln" style="width:50%;height:9px;background:#3A3A3A;margin-top:4px"></div><div class="btn out" style="width:65%;margin-top:6px"></div></div></div><div class="ln" style="width:70%;margin-top:7px"></div></div>',

  // ---- Auth ----
  role:()=>bar()+'<div class="pad"><div class="ln" style="width:40%"></div><div class="blk" style="height:30px;margin:7px 0;display:flex;align-items:center;padding:6px;gap:6px"><div class="blk" style="width:20px;height:18px"></div><div class="col" style="flex:1"><div class="ln" style="width:80%"></div><div class="ln" style="width:55%"></div></div></div><div class="blk" style="height:30px;display:flex;align-items:center;padding:6px;gap:6px"><div class="blk" style="width:20px;height:18px"></div><div class="col" style="flex:1"><div class="ln" style="width:80%"></div><div class="ln" style="width:55%"></div></div></div></div>',
  form:()=>bar()+'<div class="pad"><div class="ln" style="width:45%"></div>'+f(1)+'<div class="row">'+f(1).replace('field','field" style="flex:1')+'<div class="field" style="flex:1"></div></div>'+f(1)+'<div class="row"><div class="field" style="flex:1"></div><div class="field" style="flex:1"></div></div><div class="row" style="align-items:center;gap:4px;margin-top:2px"><div class="blk" style="width:9px;height:9px"></div><div class="ln" style="flex:1;margin:0"></div></div><div class="btn acc" style="margin-top:6px"></div></div>',
  status:()=>bar()+'<div class="pad" style="text-align:center;padding-top:30px"><div class="circle" style="width:30px;height:30px"></div><div class="ln" style="width:70%;margin:12px auto 4px"></div><div class="ln" style="width:55%;margin:0 auto"></div><div class="ln" style="width:45%;margin:4px auto"></div><div class="btn out" style="width:54%;margin:14px auto 0"></div></div>',
  status2:()=>bar()+'<div class="pad" style="text-align:center;padding-top:30px"><div class="circle" style="width:30px;height:30px;background:#D7D4CD"></div><div class="ln" style="width:70%;margin:12px auto 4px"></div><div class="ln" style="width:55%;margin:0 auto"></div><div class="ln" style="width:40%;margin:4px auto"></div><div class="btn out" style="width:54%;margin:14px auto 0"></div></div>',
  login:()=>bar()+'<div class="pad" style="padding-top:14px"><div class="ln" style="width:35%"></div>'+f(2)+'<div class="row" style="justify-content:space-between"><div class="ln" style="width:30%"></div><div class="ln" style="width:30%;background:var(--accent);opacity:.55"></div></div><div class="btn acc" style="margin-top:8px"></div><div class="ln" style="width:55%;margin:8px auto 0"></div></div>',
  forgot:()=>bar()+'<div class="pad" style="padding-top:18px"><div class="ln" style="width:55%"></div><div class="ln" style="width:75%"></div><div class="field" style="margin-top:10px"></div><div class="btn acc" style="margin-top:8px"></div><div class="ln" style="width:50%;margin:8px auto 0"></div></div>',

// ---------- render ----------
const world=document.getElementById('world'), svg=document.getElementById('edges'), viewport=document.getElementById('viewport');
const nodeEls={};
function deviceHTML(node){
  const inner=(TPL[node.kind]||(()=>''))();
  if(node.dev==='phone') return '<div class="frame phone"><div class="scr" style="height:'+(SIZE.phone.h-14)+'px"><div class="notch"></div>'+inner+'</div></div>';
  if(node.dev==='desk') return '<div><div class="frame browser" style="border-radius:8px;height:'+SIZE.desk.h+'px">'+inner+'</div><div class="stand"></div><div class="base"></div></div>';
  return '<div class="frame browser" style="height:'+SIZE.browser.h+'px">'+inner+'</div>';
}
// clusters first (behind)
CLUSTERS.forEach(cl=>{const d=document.createElement('div');d.className='cluster';
  d.style.cssText='left:'+cl.x+'px;top:'+cl.y+'px;width:'+cl.w+'px;height:'+cl.h+'px;z-index:0';
  d.innerHTML='<div class="clabel"><span class="cdot" style="background:'+cl.color+'"></span>'+cl.label+'</div>';
  world.appendChild(d);});
NODES.forEach(node=>{
  const el=document.createElement('div');el.className='node';el.dataset.id=node.id;
  const sz=SIZE[node.dev];el.style.cssText='left:'+node.x+'px;top:'+node.y+'px;width:'+sz.w+'px';
  el.innerHTML='<div class="badge">'+node.n+'</div><div class="ndot">i</div>'+deviceHTML(node)+
    '<div class="caption">'+node.title+(node.sub?'<span class="sub">'+node.sub+'</span>':'')+'</div>';
  world.appendChild(el);
  nodeEls[node.id]={el,node,w:sz.w,h:(node.dev==='phone'?SIZE.phone.h:SIZE[node.dev].h)};
});

function anchor(o,side){const n=o.node,w=o.w,h=o.h,cx=n.x+w/2,cy=n.y+h/2;
  if(side==='r')return[n.x+w,cy,1,0];if(side==='l')return[n.x,cy,-1,0];
  if(side==='t')return[cx,n.y,0,-1];return[cx,n.y+h,0,1];}
function drawEdges(){let p=svg.querySelector('defs').outerHTML;
  EDGES.forEach(e=>{const A=nodeEls[e.f],B=nodeEls[e.t];if(!A||!B)return;
    const[ax,ay,adx,ady]=anchor(A,e.a),[bx,by,bdx,bdy]=anchor(B,e.b);
    const dist=Math.hypot(bx-ax,by-ay),k=Math.min(130,dist*0.45);
    const c1x=ax+adx*k,c1y=ay+ady*k,c2x=bx+bdx*k,c2y=by+bdy*k;
    const color=e.type==='main'?'#FF601A':'#C9C6BF';
    const dash=e.type==='sec'?'stroke-dasharray="5 5"':'';
    const wdt=e.type==='main'?2:1.4,op=e.type==='sec'?0.75:1,mk=e.type==='main'?'url(#arrA)':'url(#arr)';
    p+='<path d="M'+ax+','+ay+' C'+c1x+','+c1y+' '+c2x+','+c2y+' '+bx+','+by+'" fill="none" stroke="'+color+'" stroke-width="'+wdt+'" opacity="'+op+'" '+dash+' marker-end="'+mk+'"></path>';});
  svg.innerHTML=p;}

// ---------- pan/zoom (page only) + click-to-select ----------
let tx=0,ty=0,scale=1;
function apply(){world.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';}
let down=false,moved=false,sx=0,sy=0,otx=0,oty=0,downNode=null;
viewport.addEventListener('mousedown',e=>{down=true;moved=false;sx=e.clientX;sy=e.clientY;otx=tx;oty=ty;
  downNode=e.target.closest('.node');viewport.classList.add('panning');});
window.addEventListener('mousemove',e=>{if(!down)return;
  if(Math.abs(e.clientX-sx)+Math.abs(e.clientY-sy)>4)moved=true;
  tx=otx+(e.clientX-sx);ty=oty+(e.clientY-sy);apply();});
window.addEventListener('mouseup',()=>{viewport.classList.remove('panning');if(!down)return;down=false;});
// click-based selection (works for real clicks + synthetic). Suppressed if the gesture was a drag.
viewport.addEventListener('click',e=>{
  if(moved)return;
  const n=e.target.closest('.node');
  if(n)selectNode(n.dataset.id);else closeDrawer();
});
viewport.addEventListener('wheel',e=>{e.preventDefault();
  const fct=e.deltaY<0?1.1:1/1.1,ns=Math.min(2.4,Math.max(0.22,scale*fct));
  const rx=(e.clientX-tx)/scale,ry=(e.clientY-ty)/scale;scale=ns;tx=e.clientX-rx*scale;ty=e.clientY-ry*scale;apply();},{passive:false});
// touch pan
let lt=null;
viewport.addEventListener('touchstart',e=>{if(e.touches.length===1)lt=[e.touches[0].clientX-tx,e.touches[0].clientY-ty];},{passive:true});
viewport.addEventListener('touchmove',e=>{if(lt&&e.touches.length===1){tx=e.touches[0].clientX-lt[0];ty=e.touches[0].clientY-lt[1];apply();}},{passive:true});
viewport.addEventListener('touchend',()=>lt=null);

// ---------- drawer ----------
const drawer=document.getElementById('drawer');
function selectNode(id){const o=nodeEls[id];if(!o)return;
  Object.values(nodeEls).forEach(x=>x.el.classList.remove('sel'));o.el.classList.add('sel');
  const n=o.node,role=ROLES[n.role],nt=n.notes||{};
  document.getElementById('dnum').textContent='// EKRĀNS '+String(n.n).padStart(2,'0');
  document.getElementById('dtitle').textContent=n.title;
  document.getElementById('dsub').textContent=n.sub||'';
  document.getElementById('drole').innerHTML='<i style="background:'+role.color+'"></i>'+role.label;
  let html='';
  if(nt.purpose)html+='<div class="sec"><h3>Mērķis</h3><p>'+nt.purpose+'</p></div>';
  if(nt.elements&&nt.elements.length)html+='<div class="sec"><h3>Galvenie elementi</h3><ul>'+nt.elements.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';
  if(nt.states&&nt.states.length)html+='<div class="sec"><h3>Stāvokļi</h3><div class="tags">'+nt.states.map(x=>'<span class="tag">'+x+'</span>').join('')+'</div></div>';
  if(nt.emails&&nt.emails.length)html+='<div class="sec"><h3>Saistītie e-pasti</h3><div class="tags">'+nt.emails.map(x=>'<span class="tag">✉ '+x+'</span>').join('')+'</div></div>';
  document.getElementById('dbody').innerHTML=html;drawer.classList.add('open');}
function closeDrawer(){drawer.classList.remove('open');Object.values(nodeEls).forEach(x=>x.el.classList.remove('sel'));}
document.getElementById('dclose').onclick=closeDrawer;
window.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer();});

// ---------- fit ----------
function fit(){const pad=70;let mnX=1e9,mnY=1e9,mxX=-1e9,mxY=-1e9;
  Object.values(nodeEls).forEach(o=>{mnX=Math.min(mnX,o.node.x);mnY=Math.min(mnY,o.node.y);
    mxX=Math.max(mxX,o.node.x+o.w);mxY=Math.max(mxY,o.node.y+o.h+30);});
  const w=mxX-mnX,h=mxY-mnY,sw=window.innerWidth,sh=window.innerHeight;
  scale=Math.min(1.2,(sw-pad*2)/w,(sh-pad*2-70)/h);
  tx=(sw-w*scale)/2-mnX*scale;ty=(sh-h*scale)/2-mnY*scale+22;apply();}
document.getElementById('zin').onclick=()=>{scale=Math.min(2.4,scale*1.15);apply();};
document.getElementById('zout').onclick=()=>{scale=Math.max(0.22,scale/1.15);apply();};
document.getElementById('reset').onclick=fit;
drawEdges();fit();
</script>
